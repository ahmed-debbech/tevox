services:
  base:
    build:
      context: ./base
    image: tevox_vase:latest

  ocr_service:
    build: 
      context: .
      dockerfile: ocr_service/Dockerfile
      args:
        TESSERACT_VERSION: ${TESSERACT_VERSION}
    volumes:
      - ${PATH_TEXT_OUT}:/text
      - ${PATH_PIC_IN}:/pic/
    networks:
      - tevox_net
    depends_on:
      - rabbitmq

  voice_service:
    build: 
      context: .
      dockerfile: voice_service/Dockerfile
      args:
        VOICE_NAME: ${VOICE_NAME}
        VOICE_QUALITY: ${VOICE_QUALITY}
        VOICE_LANGUAGE: ${VOICE_LANGUAGE}
        VOICE_LANGUAGE_FAMILY: ${VOICE_LANGUAGE_FAMILY}
    volumes:
      - ${PATH_VOICE_OUT}:/output
      - ${PATH_TEXT_OUT}:/input/
    depends_on:
      - rabbitmq
    networks:
      - tevox_net

  rabbitmq:
    image: rabbitmq:4.3.0-rc.0-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - tevox_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5672"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  tevox_net:
    driver: bridge